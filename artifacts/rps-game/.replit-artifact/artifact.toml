kind = "web"
previewPath = "/"
title = "Commit-Reveal RPS"
version = "1.0.0"
id = "artifacts/rps-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24066

[services.development]
run = "pnpm --filter @workspace/rps-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rps-game", "run", "build" ]
publicDir = "artifacts/rps-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24066"
BASE_PATH = "/"
